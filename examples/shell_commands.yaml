# Home Assistant Shell Command - TTS API Call
# This command calls the Home Assistant TTS API to generate audio
# with Piper TTS and returns the file path as JSON.
#
# IMPORTANT: 
# - Must be on a single line (no line breaks)
# - Replace YOUR_LONG_LIVED_TOKEN with your actual token
# - Change "fr_FR" to your language code if needed
# - Restart Home Assistant after adding/modifying shell commands

tts_api: 'curl -X POST -H "Authorization: Bearer YOUR_LONG_LIVED_TOKEN" -H "Content-Type: application/json" -d ''{"message": "{{mymessage}}", "platform": "tts.piper", "language": "fr_FR"}'' http://localhost:8123/api/tts_get_url'
