# ============================================================================
# Find Best Fuel Station Script with TTS Announcement and Route Sending
# ============================================================================
#
# ⚠️  IMPORTANT - COUNTRY-SPECIFIC IMPLEMENTATION
# 
# This script relies on the French fuel price API via the `prix_carburant`
# HACS custom integration developed by Aohzan, which uses the French
# government's open data (data.gouv.fr).
#
# Credit: Custom integration by Aohzan
# Repository: https://github.com/Aohzan/hass-prixcarburant
#
# FOR OTHER COUNTRIES: You must replace `prix_carburant.find_nearest_stations`
# with an equivalent integration for your country's fuel price data.
# Examples of country-specific APIs/integrations:
# - Germany: tankerkoenig
# - UK: petrolprices (via web scraping or unofficial APIs)
# - Spain: gasolineras (geoportalgasolineras.es)
# - Italy: osservaprezzi (mimit.gov.it)
#
# The general structure (find station → announce via TTS → send route)
# remains the same regardless of country.
#
# ============================================================================
#
# DEPENDENCIES:
# - prix_carburant integration by Aohzan (HACS - French only)
#   https://github.com/Aohzan/hass-prixcarburant
# - script.tts_android_auto_vlc (for voice announcement)
# - mbapi2020 integration (for Mercedes-Benz vehicles)
#   Other vehicles: use your car's specific integration or remove this step
#
# FIELDS:
# - strategy: "price" (cheapest) or "distance" (closest)
# - radius: Search radius in km
#
# BEHAVIOR:
# - Finds best fuel station based on strategy
# - Announces it via TTS through Android Auto
# - Sends route to car navigation
#
# ============================================================================
find_best_fuel_station:
  alias: "⛽ Find Best Fuel Station"
  fields:
    strategy:
      description: "Strategy: 'price' (cheapest) or 'distance' (closest)"
    radius:
      description: "Search radius in km"
      default: 30
  sequence:
    # Step 1: Search for nearby fuel stations
    # Note: prix_carburant is French-specific. Replace with your country's API.
    - action: prix_carburant.find_nearest_stations
      data:
        entity_id: person.DRIVER  # Replace with your person entity
        fuel: E10  # Fuel type (E10, E85, SP95, SP98, Gazole, etc.)
        distance: "{{ radius }}"
      response_variable: stations_response
    
    # Step 2: Get user's current location
    - variables:
        lat_user: "{{ state_attr('person.DRIVER', 'latitude') }}"
        lon_user: "{{ state_attr('person.DRIVER', 'longitude') }}"
    
    # Step 3: Select best station based on strategy (returns index)
    # Note: We use index instead of object to avoid Jinja2 stringification
    - variables:
        station_idx: >-
          {% set stations_list = stations_response.stations %}
          {% if strategy == 'price' %}
            {% set ns = namespace(min_price=999999, best_idx=0) %}
            {% for s in stations_list %}
              {% if s.price | float < ns.min_price %}
                {% set ns.min_price = s.price | float %}
                {% set ns.best_idx = loop.index0 %}
              {% endif %}
            {% endfor %}
            {{ ns.best_idx }}
          {% else %}
            {% set ns = namespace(min_dist=999999, best_idx=0) %}
            {% for s in stations_list %}
              {% set dist = distance(lat_user, lon_user, s.latitude | float, s.longitude | float) %}
              {% if dist < ns.min_dist %}
                {% set ns.min_dist = dist %}
                {% set ns.best_idx = loop.index0 %}
              {% endif %}
            {% endfor %}
            {{ ns.best_idx }}
          {% endif %}
    
    # Step 4: Retrieve full station object via index
    - variables:
        station: "{{ stations_response.stations[station_idx | int] }}"
    
    # Step 5: Extract address components and metadata
    - variables:
        address_parts: "{{ station.address.split(',') }}"
        full_city: "{{ address_parts[-1].strip() if address_parts | length > 1 else '' }}"
        city_parts: "{{ full_city.split(' ') }}"
        postcode: "{{ city_parts[0] if city_parts | length > 1 else '' }}"
        city: "{{ city_parts[1:] | join(' ') if city_parts | length > 1 else full_city }}"
        street: "{{ address_parts[0].strip() if address_parts | length > 0 else station.address }}"
        station_distance: >
          {{ distance(lat_user, lon_user, station.latitude | float, station.longitude | float) | round(0) | int }}
        # Format price with comma for French TTS pronunciation
        # For English: remove the replace filter
        station_price: "{{ (station.price | round(2)) | string | replace('.', ',') }}"
        station_name: "{{ station.name | default('') }}"
        # List of known fuel station brands (adapt for your country)
        known_brands:
          - TotalEnergies
          - Total Access
          - Total
          - Esso Express
          - Esso
          - Shell
          - BP
          - Avia
          - Carrefour
          - Intermarché
          - Leclerc
          - E.Leclerc
          - Auchan
          - Système U
          - Super U
          - Hyper U
          - Casino
          - Cora
          - Lidl
          - Aldi
          - Relais
          - Dyneff
        station_brand: >
          {% set ns = namespace(found='') %}
          {% for m in known_brands %}
            {% if m.lower() in station_name.lower() and not ns.found %}
              {% set ns.found = m %}
            {% endif %}
          {% endfor %}
          {{ ns.found }}
    
    # Step 6: Voice announcement via TTS on Android Auto
    # French message - adapt for your language
    - action: script.tts_android_auto_vlc
      data:
        message: >
          {% set qualif = 'la moins chère' if strategy == 'price' else 'la plus proche' %}
          {% if station_brand %}
            {{ city }}, station {{ station_brand }} {{ qualif }} trouvée à {{ station_distance }} kilomètres, prix au litre {{ station_price }} euros
          {% else %}
            {{ city }}, station {{ qualif }} trouvée à {{ station_distance }} kilomètres, prix au litre {{ station_price }} euros
          {% endif %}
    
    # Step 7: Send route to car navigation (Mercedes-Benz example)
    # For other vehicles, replace with your car's integration
    - action: mbapi2020.send_route
      data:
        vin: YOUR_CAR_VIN  # Replace with your car's VIN
        title: "⛽ {{ station.address }}"
        latitude: "{{ station.latitude }}"
        longitude: "{{ station.longitude }}"
        city: "{{ city }}"
        postcode: "{{ postcode }}"
        street: "{{ street }}"
