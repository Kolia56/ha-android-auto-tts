# Home Assistant Script - TTS on Android Auto via VLC
# This script:
# 1. Calls Home Assistant TTS API to generate audio with Piper
# 2. Extracts the file path from the JSON response
# 3. Sends an intent to the phone to open VLC with the audio URL
# 4. VLC plays the audio through Android Auto to car speakers

tts_android_auto_vlc:
  alias: TTS Android Auto VLC
  sequence:
    # Step 1: Generate TTS audio via API and capture the response
    - service: shell_command.tts_api
      data:
        mymessage: "{{ message }}"
      response_variable: json_data
    
    # Step 2: Parse JSON response to extract the audio file path
    - variables:
        tts_path: >
          {% set parsed_data = json_data['stdout'] | from_json %}
          {{ parsed_data.path }}
    
    # Step 3: Send VLC intent to phone with the audio URL
    - service: notify.mobile_app_YOUR_PHONE
      data:
        message: command_activity
        data:
          intent_package_name: org.videolan.vlc
          intent_action: android.intent.action.VIEW
          intent_uri: https://YOUR_EXTERNAL_URL:8123{{ tts_path }}?access_token=YOUR_LONG_LIVED_TOKEN
  
  fields:
    message:
      selector:
        text: null
      name: Message
      required: true
      description: "Text to be spoken"
  
  mode: single
  icon: mdi:car-wireless
