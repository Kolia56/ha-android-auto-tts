# Example Home Assistant Automation - Low Fuel Alert with TTS
# 
# This automation triggers TTS announcements when the car's fuel level
# drops below 30%, 20%, and 10% thresholds.
#
# Requirements:
# - script.tts_android_auto_vlc must be configured
# - A sensor reporting fuel level percentage (replace sensor name accordingly)
# - Phone connected to Android Auto for the message to be heard in car

- alias: "Low Fuel Alert with TTS"
  id: low_fuel_alert_tts
  mode: queued
  max: 3
  trigger:
    - platform: template
      id: "30"
      value_template: >
        {% set fuel = states('sensor.YOUR_FUEL_LEVEL_SENSOR') | float(100) %}
        {{ fuel < 30 and fuel >= 20 }}
    
    - platform: template
      id: "20"
      value_template: >
        {% set fuel = states('sensor.YOUR_FUEL_LEVEL_SENSOR') | float(100) %}
        {{ fuel < 20 and fuel >= 10 }}
    
    - platform: template
      id: "10"
      value_template: >
        {% set fuel = states('sensor.YOUR_FUEL_LEVEL_SENSOR') | float(100) %}
        {{ fuel < 10 }}
  
  action:
    - service: script.tts_android_auto_vlc
      data:
        message: "Fuel level has reached {{ trigger.id }} percent"
